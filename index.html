<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Turismo Extremo Sur</title>
  <link rel="stylesheet" href="mystile.css">
  <script src="validacion.js" defer></script>
</head>

<body onload="mostrarServicios(); mostrarSeccion('quienes')">

<nav>
  <a href="#" onclick="mostrarSeccion('quienes')">¿Quiénes somos?</a>
  <a href="#" onclick="mostrarSeccion('servicios')">Nuestros servicios</a>
  <a href="#" onclick="mostrarSeccion('contacto')">Contáctanos</a>
</nav>

<section id="quienes">
  <h2>¿Quiénes somos?</h2>

  <img src="img/trabajador.jpg" alt="Foto de perfil" width="150">

  <p><strong>Nombre:</strong> Etiann Beiza </p>
  <p><strong>Email:</strong> etiann.beiza@gmail.com</p>
</section>

<section id="servicios">
  <h2>Nuestros Servicios</h2>
  <div id="contenedor-servicios"></div>

  <h3>Ubicación</h3>
  <iframe 
    src="https://www.google.com/maps?q=Punta+Arenas&output=embed"
    width="100%" height="300">
  </iframe>

<section id="contacto">
  <h2>Contáctanos</h2>

  <form id="formulario" onsubmit="validarFormulario(event)">
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="celular" placeholder="Celular">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="pais" placeholder="País">
    <input type="text" id="ciudad" placeholder="Ciudad">
    <textarea id="consulta" placeholder="Escribe tu consulta"></textarea>

    <button type="submit">Enviar</button>
  </form>

</section>

</body>
</html>
